<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Report Found Item</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body{font-family:'Poppins',sans-serif;background:linear-gradient(to right,#f8f9fa,#e9ecef);}</style>
</head>
<body>
<div class="container py-4" style="max-width:640px">
    <a href="/" class="btn btn-outline-secondary mb-4">← Back</a>
    <div class="card shadow-lg border-0 rounded-4 p-4">
        <h3 class="fw-bold mb-1">✋ Report a Found Item</h3>
        <p class="text-muted mb-4">Describe what you found and we'll automatically notify anyone who may have lost it.</p>
        <form method="POST" action="/report-found" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Item Name</label>
                    <input type="text" name="item_name" class="form-control" placeholder="e.g. Black Wallet" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Category</label>
                    <select name="category" class="form-select">
                        {% for cat in categories %}<option value="{{ cat }}">{{ cat }}</option>{% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" class="form-control" rows="3"
                              placeholder="Describe the item in detail — colour, brand, contents, any identifying marks..." required></textarea>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Where did you find it?</label>
                    <input type="text" name="location" class="form-control" placeholder="e.g. Main Library, 2nd floor" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Your Name</label>
                    <input type="text" name="finder" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Your Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Upload Photo <span class="text-muted small">(strongly recommended for better matching)</span></label>
                    <input type="file" name="image" class="form-control" accept="image/*">
                </div>
                <div class="col-12">
                    <div class="alert alert-info small mb-0">
                        🤖 Our system will automatically compare your report against all active lost item reports and notify potential owners by email.
                    </div>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary w-100 fw-semibold">Submit Found Item Report</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
</html>
